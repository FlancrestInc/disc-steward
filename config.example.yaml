# Recommended deployment: run Disc Steward on Gospel.
# Paths in pipeline_root, paths, and transfer roots are controller_path values:
# the paths Gospel uses through its Barnabas and Eddy mounts.
pipeline_root: /mnt/Barnabas/data2/media-pipeline
database_path: /var/lib/disc-steward/disc_steward.sqlite3
ffprobe_path: ffprobe
ffmpeg_path: ffmpeg

paths:
  raw_rip_path: /mnt/Barnabas/data2/media-pipeline/01_disc_rips_raw
  scan_complete_path: /mnt/Barnabas/data2/media-pipeline/02_scan_complete
  review_needed_path: /mnt/Barnabas/data2/media-pipeline/03_review_needed
  fileflows_work_order_path: /mnt/Barnabas/data2/media-pipeline/04_ready_for_fileflows
  fileflows_working_path: /mnt/Barnabas/data2/media-pipeline/05_fileflows_working
  validation_needed_path: /mnt/Barnabas/data2/media-pipeline/06_validation_needed
  ready_for_eddy_path: /mnt/Barnabas/data2/media-pipeline/07_ready_for_eddy
  transferred_to_eddy_path: /mnt/Barnabas/data2/media-pipeline/08_transferred_to_eddy
  manual_review_path: /mnt/Barnabas/data2/media-pipeline/90_manual_review
  failed_path: /mnt/Barnabas/data2/media-pipeline/99_failed

path_mappings:
  barnabas:
    - controller_path: /mnt/Barnabas/data2/media-pipeline
      barnabas_path: /mnt/data2/media-pipeline
  eddy:
    - controller_path: /mnt/Eddy/jellyfin-media
      eddy_path: /mnt/jellyfin-media

preferred_video_profile: universal_h264_aac_srt
preferred_audio_fallback_codec: aac
preferred_subtitle_format: srt
subtitle_planning:
  preferred_format: srt
  preserve_original_subtitles: true
  convert_image_subtitles_to_srt: false
  preserve_ass_for_anime: true
  add_srt_fallback_for_ass: true

japanese_anime:
  preserve_unicode_metadata: true
  english_filename_with_original_metadata: true
  allow_original_title_in_filename: false
  preserve_ass_by_default: true
  auto_translate_metadata: false

encoding_profiles:
  - remux_only
  - universal_h264_aac_srt
  - subtitle_fix_only
  - h265_archive_friendly
  - manual_review
subtitle_policies:
  - preserve_existing
  - prefer_srt_preserve_original
  - ocr_image_subtitles_to_srt_preserve_original
  - generate_missing_srt_unverified
  - preserve_ass_add_srt_fallback
  - manual_review
minimum_title_duration_seconds: 30
raw_rip_retention_days: 30
working_file_retention_days: 14
dry_run: true

validation:
  duration_tolerance_seconds: 3
  duration_tolerance_percent: 1.0
  require_aac_fallback: true
  require_no_default_image_subtitles: true
  allow_manual_acceptance: true

transfer:
  method: local_mount
  eddy_incoming_root: /mnt/Eddy/jellyfin-media/.incoming/disc-steward
  eddy_final_roots:
    Movies: /mnt/Eddy/jellyfin-media/Movies
    Shows: /mnt/Eddy/jellyfin-media/Shows
    Anime: /mnt/Eddy/jellyfin-media/Anime
    Family Videos: /mnt/Eddy/jellyfin-media/Family Videos
  rsync_target:
  ssh_options: []
  verify: size
  allow_overwrite: false
  create_final_directories: true

jellyfin:
  enabled: false
  base_url: http://eddy:8096
  api_key: ""
  refresh_after_import: false
  library_ids: []

cleanup:
  enabled: false
  dry_run: true
  raw_rip_retention_days_after_import: 14
  working_file_retention_days_after_import: 7
  delete_raw_rips: false
  delete_working_files: false
  archive_raw_rips_to_eddy: false
  raw_rip_archive_path: ""
  require_successful_jellyfin_import: true

metadata:
  enabled: false
  providers:
    tmdb:
      enabled: false
      api_key: ""
    tvdb:
      enabled: false
      api_key: ""
    anilist:
      enabled: false
    anidb:
      enabled: false
      api_key: ""
    mal:
      enabled: false
      # MyAnimeList public API client ID, sent as X-MAL-CLIENT-ID.
      api_key: ""

llm:
  enabled: false
  provider: hermes
  endpoint: ""
  max_items_per_request: 10
  max_chars_per_field: 500
  allow_full_subtitle_text: false
  allow_shell_commands: false

jellyfin_logs:
  enabled: false
  log_path: ""
  scan_recent_days: 7

dashboard:
  enabled: true
